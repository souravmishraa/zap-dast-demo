name: OWASP ZAP DAST Scan

on:
  push:
    branches: ["main"]

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start Express App
        run: |
          nohup node app.js &
          sleep 15

      - name: Run ZAP Scan
        run: |
          # 1. Give Docker permission to save reports in our current folder
          chmod 777 .

          # 2. Create a simple rules file to ignore certain warnings
          echo -e "10027\tIGNORE\t(.*)" > rules.tsv
          echo -e "10096\tIGNORE\t(.*)" >> rules.tsv

          # 3. Run the ZAP scan using Docker
          # The -I flag tells ZAP not to fail the pipeline just because it found warnings (fixes exit code 2)
          docker run --rm --network host -v $(pwd):/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json -c rules.tsv -I

      - name: Check for High Risk Alerts
        run: |
          # 4. Read the report and fail if there are High risk alerts
          HIGH_ALERTS=$(jq '[.site[0].alerts[] | select(.riskdesc | contains("High"))] | length' report.json)
          
          echo "High Risk Alerts: $HIGH_ALERTS"
          
          if [ "$HIGH_ALERTS" -gt 0 ]; then
            echo "Failing pipeline due to high risk vulnerabilities!"
            exit 1
          else
            echo "Passed! No high risk vulnerabilities found."
          fi

      - name: Upload ZAP Report
        if: always() # Ensure reports are uploaded even if the scan fails
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report.html
            report.json