name: OWASP ZAP DAST Scan

on:
  push:
    branches: ["main"]

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OLD EXPRESS APP START (COMMENTED)
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 18

      # - name: Install dependencies
      #   run: npm install

      # - name: Start App
      #   run: |
      #     nohup node app.js &
      #     sleep 15

      # START OWASP JUICE SHOP
      - name: Start OWASP Juice Shop
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop
          sleep 40

      # STABLE ZAP RUN
      - name: Run ZAP Scan (Stable Mode)
        run: |
          mkdir -p zap-reports

          # Permissions
          chmod 777 zap-reports
          chmod 777 $PWD

          # Create false-positive suppression rules
          echo -e "10027\tIGNORE\t(.*)" > rules.tsv
          echo -e "10096\tIGNORE\t(.*)" >> rules.tsv

          # Run ZAP Scan
          docker run --rm \
            --network host \
            -v $PWD:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r zap-reports/report.html \
            -J zap-reports/report.json \
            -c rules.tsv \
            -I

      # QUALITY GATE
      - name: Quality Gate (Check for High Risk Alerts)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          HIGH_ALERTS=$(jq '[.site[0].alerts[] | select(.riskdesc | contains("High"))] | length' zap-reports/report.json)

          echo "High Risk Alerts: $HIGH_ALERTS"

          # if [ "$HIGH_ALERTS" -gt 0 ]; then
          #   echo "Failing pipeline due to high risk vulnerabilities!"
          #   exit 1
          # else
          #   echo "Passed! No high risk vulnerabilities found."
          # fi

if [ "$HIGH_ALERTS" -gt 0 ]; then
  echo "High risk vulnerabilities detected!"
  echo "Quality gate warning generated."
else
  echo "Passed! No high risk vulnerabilities found."
fi
      # UPLOAD REPORT
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports