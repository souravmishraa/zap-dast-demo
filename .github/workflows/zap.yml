name: OWASP ZAP DAST Scan

on:
  push:
    branches: ["main"]

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start App
        run: |
          nohup node app.js &
          sleep 15

      # Create ZAP config file
      - name: Create Ignore Rules
        run: |
          mkdir -p zap-rules

          echo "10027 IGNORE" > zap-rules/rules.tsv
          echo "10096 IGNORE" >> zap-rules/rules.tsv

      # Run ZAP Scan
      - name: Run ZAP Baseline Scan
        run: |
          mkdir -p zap-reports
          chmod -R 777 zap-reports
          chmod -R 777 zap-rules

          docker run --rm \
            --network host \
            -v $PWD:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r /zap/wrk/zap-reports/report.html \
            -J /zap/wrk/zap-reports/report.json \
            -c /zap/wrk/zap-rules/rules.tsv \
            -m 5

      # Fail pipeline on High Alerts
      - name: Check High Risk Alerts
        run: |
          HIGH=$(cat zap-reports/report.json | jq '.site[0].alerts | map(select(.riskdesc | contains("High"))) | length')

          echo "High Risk Alerts: $HIGH"

          if [ "$HIGH" -gt 0 ]; then
            echo "High Risk Vulnerabilities Found!"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports