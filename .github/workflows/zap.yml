name: OWASP ZAP DAST Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start App
        run: |
          # Start the app in the background
          node app.js &
          # Wait until the server is actually responding before starting the scan
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Tuned ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # The URL of your running application
          target: 'http://localhost:3000'
          
          # 🛠️ TUNED POLICY: Uses the config file created above
          rules_file_name: 'zap.conf'
          
          # 🛑 QUALITY GATE: Setting this to true fails the build if 
          # vulnerabilities (not ignored in zap.conf) are found.
          fail_action: true
          
          # This allows the action to output the report to the GitHub summary
          allow_issue_writing: false

      - name: Upload Scan Report
        if: always() # Ensures the report is available even if the scan fails
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_out.html # Default output name for this action