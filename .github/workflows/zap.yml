      # 🔥 FIXED STABLE ZAP RUN
      - name: Run ZAP Scan (Stable Mode)
        run: |
          mkdir -p zap-reports
          # Fix Permission Denied: Allow the ZAP container user to write reports here
          chmod 777 zap-reports
          # Also allow ZAP to write the temporary zap.yaml file to the root of the workspace
          chmod 777 $PWD

          # ---> ADDED: Create false-positive suppression rules <---
          echo -e "10027\tIGNORE\t(.*)" > rules.tsv
          echo -e "10096\tIGNORE\t(.*)" >> rules.tsv

          # Fix Network: Use --network host and point to localhost
          # ---> ADDED: -c rules.tsv to apply the rules <---
          docker run --rm \
            --network host \
            -v $PWD:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r /zap/wrk/zap-reports/report.html \
            -J /zap/wrk/zap-reports/report.json \
            -c rules.tsv \
            -I

      # ---> ADDED: Severity-based quality gate <---
      - name: Quality Gate (Check for High Risk Alerts)
        run: |
          # Read the report and fail if there are High risk alerts
          HIGH_ALERTS=$(jq '[.site[0].alerts[] | select(.riskdesc | contains("High"))] | length' zap-reports/report.json)
          
          echo "High Risk Alerts: $HIGH_ALERTS"
          
          if [ "$HIGH_ALERTS" -gt 0 ]; then
            echo "Failing pipeline due to high risk vulnerabilities!"
            exit 1
          else
            echo "Passed! No high risk vulnerabilities found."
          fi

      - name: Upload Report
        if: always() # Ensure report is uploaded even if the quality gate fails
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports
